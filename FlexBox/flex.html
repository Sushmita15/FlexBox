<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Fun</title>
<style>
/* Additional styles for fun */
.red { background: tomato; }
.blue { background: dodgerblue; }
.green { background: mediumseagreen; }
.orange { background: orange; }
.pink { background: rgb(209, 108, 177); }

.flex-item {
width: 100px;
height: 100px;
color: white;
font-size: 2em;
align-items: center;
justify-content: center;
display: flex;
font-size: 45px;
}

.flex-container {
background-color: gray;
display: flex;
flex-wrap: wrap;
justify-content: space-around;
}

@media (min-width: 600px) {
.flex-item {
    color: rgb(65, 65, 65);
    }
}

@media (min-width: 900px) {
.flex-container {
    justify-content: center; 
  }

  .flex-item {
    flex-direction: row; 
    color: purple; 
  }
}



</style>
</head>
<body>
<header>
<h1>FlexBox practice</h1>
</header>
<main>
<section class="flex-container">
<div class="flex-item red">1</div>

<div class="flex-item blue">2</div>

<div class="flex-item green">3</div>

<div class="flex-item orange">4</div>

<div class="flex-item pink" >5</div>

</section>
</main>
<footer>
<p>Do we need this?</p>
</footer>
</body>
</html>
